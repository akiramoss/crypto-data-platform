version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: crypto-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crypto_db
      MYSQL_USER: cryptouser
      MYSQL_PASSWORD: crypto123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: crypto-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/crypto_db
      SPRING_DATASOURCE_USERNAME: cryptouser
      SPRING_DATASOURCE_PASSWORD: crypto123

volumes:
  mysql_data:
