spring.application.name=crypto-data-platform

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/crypto_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=cryptouser
spring.datasource.password=crypto123

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# API
crypto.api.url=https://api.coingecko.com/api/v3/coins/markets
crypto.api.vsCurrency=usd
crypto.api.order=market_cap_desc
crypto.api.perPage=10
crypto.api.key=demo-key